# StNuclearIdMaker histogram definitions

axes:
  P: &P
    nBins: 600
    min: 0.0
    max: 6.0
  dEdx: &dEdx
    nBins: 1200
    min: 0.0
    max: 120.0
  Eta: &Eta
    nBins: 100
    min: -3.0
    max: 3.0
  Rapidity: &Rapidity
    nBins: 100
    min: -3.0
    max: 3.0
  Pt: &Pt
    nBins: 600
    min: 0.0
    max: 6.0
  M2: &M2
    nBins: 1000
    min: -0.5
    max: 25.0
  Vz: &Vz
    nBins: 400
    min: -100.0
    max: 100.0

  RefMult: &RefMult
    nBins: 1000
    min: 0.0
    max: 1000.0
  RefMultWeight: &RefMultWeight
    nBins: 125
    min: 0.5
    max: 3.0
  TofMatchMult: &TofMatchMult
    nBins: 500
    min: 0.0
    max: 500.0
  Cent9: &Cent9
    nBins: 9
    min: -0.5
    max: 8.5
  Cent16: &Cent16
    nBins: 16
    min: -0.5
    max: 15.5

histograms:

  hCentrality:
    axis: *Cent9
    title: "Centrality bin (cent9);cent9 (0=70-80%%, 8=0-5%%);Counts"
  hCentralityRaw:
    axis: *Cent9
    title: "Centrality bin before bin cut;cent9 (0=70-80%%, 8=0-5%%);Counts"
  hCentrality16:
    axis: *Cent16
    title: "Centrality bin (cent16);cent16;Counts"
  hRefMult:
    axis: *RefMult
    title: "RefMult;RefMult;Counts"
  hRefMultCorr:
    axis: *RefMult
    title: "Corrected multiplicity;refMult_{corr};Counts"
  hRefMultWeight:
    axis: *RefMultWeight
    title: "StRefMultCorr event weight;weight;Counts"
  hRefMultVsNTOFMatch:
    xAxis: *TofMatchMult
    yAxis: *RefMult
    title: "nBTOFMatch vs refMult (before pileup cut);nBTOFMatch;refMult"
  hRefMultVsNTOFMatchAfter:
    xAxis: *TofMatchMult
    yAxis: *RefMult
    title: "nBTOFMatch vs refMult (after pileup cut);nBTOFMatch;refMult"
  hCentralityVsVz:
    xAxis: *Vz
    yAxis: *Cent9
    title: "cent9 vs V_{z};V_{z} [cm];cent9 (0=70-80%%, 8=0-5%%)"
  hRawMult:
