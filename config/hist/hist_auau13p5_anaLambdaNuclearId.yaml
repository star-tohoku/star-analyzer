# StLambdaMaker and StNuclearIdMaker combined histogram definitions (13.5 GeV)

axes:
  # Lambda-specific axes
  InvMassLambda: &InvMassLambda
    nBins: 200
    min: 1.05
    max: 1.25
  PtLambda: &PtLambda
    nBins: 200
    min: 0.0
    max: 10.0
  EtaLambda: &EtaLambda
    nBins: 100
    min: -2.5
    max: 2.5
  PhiLambda: &PhiLambda
    nBins: 100
    min: -3.15
    max: 3.15
  DCA: &DCA
    nBins: 200
    min: 0.0
    max: 5.0
  CosPointing: &CosPointing
    nBins: 100
    min: 0.99
    max: 1.01
  Vz: &Vz
    nBins: 400
    min: -100.0
    max: 100.0
  RefMult: &RefMult
    nBins: 1000
    min: 0.0
    max: 1000.0
  NSigmaY: &NSigmaY
    nBins: 100
    min: -5.0
    max: 5.0
  TofMatchMult: &TofMatchMult
    nBins: 500
    min: 0.0
    max: 500.0
  Cent9: &Cent9
    nBins: 9
    min: -0.5
    max: 8.5
  Cent16: &Cent16
    nBins: 16
    min: -0.5
    max: 15.5
  RefMultWeight: &RefMultWeight
    nBins: 125
    min: 0.5
    max: 3.0
  NCand: &NCand
    nBins: 200
    min: 0.0
    max: 200.0
  NTracks: &NTracks
    nBins: 500
    min: 0.0
    max: 2000.0
  NLambdaPairs: &NLambdaPairs
    nBins: 200
    min: 0.0
    max: 200.0

  # NuclearId-specific axes
  P: &P
    nBins: 600
    min: 0.0
    max: 6.0
  dEdx: &dEdx
    nBins: 1200
    min: 0.0
    max: 120.0
  EtaNuclear: &EtaNuclear
    nBins: 100
    min: -3.0
    max: 3.0
  Rapidity: &Rapidity
    nBins: 100
    min: -3.0
    max: 3.0
  PtNuclear: &PtNuclear
    nBins: 600
    min: 0.0
    max: 6.0
  M2: &M2
    nBins: 1000
    min: -0.5
    max: 25.0
  Kstar: &Kstar
    nBins: 200
    min: 0.0
    max: 1.0
  Qlab: &Qlab
    nBins: 200
    min: 0.0
    max: 2.0

