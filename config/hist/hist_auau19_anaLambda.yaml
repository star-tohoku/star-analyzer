# StLambdaMaker histogram definitions (Lambda V0 p+ pi-)

axes:
  InvMassLambda: &InvMassLambda
    nBins: 200
    min: 1.05
    max: 1.25
  Pt: &Pt
    nBins: 200
    min: 0.0
    max: 10.0
  Y: &Y
    nBins: 100
    min: -2.0
    max: 2.0
  DecayLength: &DecayLength
    nBins: 200
    min: 0.0
    max: 100.0
  Eta: &Eta
    nBins: 100
    min: -2.5
    max: 2.5
  Phi: &Phi
    nBins: 100
    min: -3.15
    max: 3.15
  DCA: &DCA
    nBins: 200
    min: 0.0
    max: 5.0
  CosPointing: &CosPointing
    nBins: 100
    min: 0.99
    max: 1.01
  Vz: &Vz
    nBins: 400
    min: -100.0
    max: 100.0
  RefMult: &RefMult
    nBins: 1000
    min: 0.0
    max: 1000.0
  NSigmaY: &NSigmaY
    nBins: 100
    min: -5.0
    max: 5.0
  TofMatchMult: &TofMatchMult
    nBins: 500
    min: 0.0
    max: 500.0
  Cent9: &Cent9
    nBins: 9
    min: -0.5
    max: 8.5
  Cent16: &Cent16
    nBins: 16
    min: -0.5
    max: 15.5
  RefMultWeight: &RefMultWeight
    nBins: 125
    min: 0.5
    max: 3.0
  NCand: &NCand
    nBins: 200
    min: 0.0
    max: 200.0
  NTracks: &NTracks
    nBins: 500
    min: 0.0
    max: 2000.0
  NLambdaPairs: &NLambdaPairs
    nBins: 200
    min: 0.0
    max: 200.0

histograms:
  # Event
  hVz:
    axis: *Vz
    title: "Primary Vertex Z;V_{z} [cm];Counts"
  hRefMult:
    axis: *RefMult
    title: "RefMult;RefMult;Counts"

  hCentrality:
    axis: *Cent9
    title: "Centrality bin (cent9);cent9 (0=70-80%%, 8=0-5%%);Counts"
  hCentralityRaw:
    axis: *Cent9
    title: "Centrality bin before bin cut;cent9 (0=70-80%%, 8=0-5%%);Counts"
  hCentrality16:
    axis: *Cent16
    title: "Centrality bin (cent16);cent16;Counts"
  hRefMultCorr:
    axis: *RefMult
    title: "Corrected multiplicity;refMult_{corr};Counts"
  hRefMultWeight:
    axis: *RefMultWeight
    title: "StRefMultCorr event weight;weight;Counts"
  hRefMultVsNTOFMatch:
    xAxis: *TofMatchMult
    yAxis: *RefMult
    title: "nBTOFMatch vs refMult (before pileup cut);nBTOFMatch;refMult"
  hRefMultVsNTOFMatchAfter:
    xAxis: *TofMatchMult
    yAxis: *RefMult
    title: "nBTOFMatch vs refMult (after pileup cut);nBTOFMatch;refMult"
  hCentralityVsVz:
    xAxis: *Vz
    yAxis: *Cent9
    title: "cent9 vs V_{z};V_{z} [cm];cent9 (0=70-80%%, 8=0-5%%)"
  hRawMult:
    axis: *RefMult
    title: "Raw multiplicity (refmult/fxtmult);mult;Counts"
  hRawMult_vs_RefMultCorr:
    xAxis: *RefMult
    yAxis: *RefMult
    title: "rawMult vs refMult_{corr};refMult_{corr};rawMult"
  hRawMult_vs_Cent9:
    xAxis: *Cent9
    yAxis: *RefMult
    title: "rawMult vs cent9;cent9 (0=70-80%%, 8=0-5%%);rawMult"
  hRefMultCorr_vs_Cent9:
    xAxis: *Cent9
    yAxis: *RefMult
    title: "refMult_{corr} vs cent9;cent9 (0=70-80%%, 8=0-5%%);refMult_{corr}"
  hNTracks_vs_Cent9:
    xAxis: *Cent9
    yAxis: *NTracks
    title: "N_{tracks} vs cent9;cent9 (0=70-80%%, 8=0-5%%);N_{tracks}"
  hTofMatchMult_vs_Cent9:
    xAxis: *Cent9
    yAxis: *TofMatchMult
    title: "nBTOFMatch vs cent9;cent9 (0=70-80%%, 8=0-5%%);nBTOFMatch"
  hNProtonCand_vs_Cent9:
    xAxis: *Cent9
    yAxis: *NCand
    title: "N_{proton cand.} vs cent9;cent9 (0=70-80%%, 8=0-5%%);N_{p}"
  hNPionCand_vs_Cent9:
    xAxis: *Cent9
    yAxis: *NCand
    title: "N_{#pi^{-} cand.} vs cent9;cent9 (0=70-80%%, 8=0-5%%);N_{#pi^{-}}"
  hNLambdaPairs_vs_Cent9:
    xAxis: *Cent9
    yAxis: *NLambdaPairs
    title: "Helix-pass p#pi^{-} pairs vs cent9;cent9 (0=70-80%%, 8=0-5%%);N_{pairs}"
  hLambda_InvMass_vs_Cent9:
    xAxis: *Cent9
    yAxis: *InvMassLambda
    title: "M_{p#pi^{-}} vs cent9;cent9 (0=70-80%%, 8=0-5%%);M_{p#pi^{-}} [GeV/c^{2}]"
  hLambda_InvMass_vs_RefMultCorr:
    xAxis: *RefMult
    yAxis: *InvMassLambda
    title: "M_{p#pi^{-}} vs refMult_{corr};refMult_{corr};M_{p#pi^{-}} [GeV/c^{2}]"
  hLambda_InvMass_CentBin0:
    axis: *InvMassLambda
    title: "M_{p#pi^{-}} cent9=0 (70-80%%);M_{p#pi^{-}} [GeV/c^{2}];Counts"
  hLambda_InvMass_CentBin1:
    axis: *InvMassLambda
    title: "M_{p#pi^{-}} cent9=1 (60-70%%);M_{p#pi^{-}} [GeV/c^{2}];Counts"
  hLambda_InvMass_CentBin2:
    axis: *InvMassLambda
    title: "M_{p#pi^{-}} cent9=2 (50-60%%);M_{p#pi^{-}} [GeV/c^{2}];Counts"
  hLambda_InvMass_CentBin3:
    axis: *InvMassLambda
    title: "M_{p#pi^{-}} cent9=3 (40-50%%);M_{p#pi^{-}} [GeV/c^{2}];Counts"
  hLambda_InvMass_CentBin4:
    axis: *InvMassLambda
    title: "M_{p#pi^{-}} cent9=4 (30-40%%);M_{p#pi^{-}} [GeV/c^{2}];Counts"
  hLambda_InvMass_CentBin5:
    axis: *InvMassLambda
    title: "M_{p#pi^{-}} cent9=5 (20-30%%);M_{p#pi^{-}} [GeV/c^{2}];Counts"
  hLambda_InvMass_CentBin6:
    axis: *InvMassLambda
    title: "M_{p#pi^{-}} cent9=6 (10-20%%);M_{p#pi^{-}} [GeV/c^{2}];Counts"
  hLambda_InvMass_CentBin7:
    axis: *InvMassLambda
    title: "M_{p#pi^{-}} cent9=7 (5-10%%);M_{p#pi^{-}} [GeV/c^{2}];Counts"
  hLambda_InvMass_CentBin8:
    axis: *InvMassLambda
    title: "M_{p#pi^{-}} cent9=8 (0-5%%);M_{p#pi^{-}} [GeV/c^{2}];Counts"

  # Lambda invariant mass (main)
  hLambda_InvMass:
    axis: *InvMassLambda
    title: "Lambda invariant mass (Helix);M_{p#pi^{-}} [GeV/c^{2}];Counts"

  # Debug 1D
  hLambda_Pt:
    axis: *Pt
    title: "Lambda p_{T};p_{T} [GeV/c];Counts"
  hLambda_Eta:
    axis: *Eta
    title: "Lambda #eta;#eta;Counts"
  hLambda_Phi:
    axis: *Phi
    title: "Lambda #phi;#phi [rad];Counts"
  hDCA12:
    axis: *DCA
    title: "DCA between p and #pi^{-} at V0;DCA [cm];Counts"
  hDCAV0:
    axis: *DCA
    title: "DCA of Lambda to PV;DCA [cm];Counts"
  hCosPointing:
    axis: *CosPointing
    title: "cos(pointing angle);cos(#theta);Counts"
  hNSigmaProton:
    axis: *NSigmaY
    title: "Proton n#sigma_{p};n#sigma_{p};Counts"
  hNSigmaPion:
    axis: *NSigmaY
    title: "Pion n#sigma_{#pi};n#sigma_{#pi};Counts"

  # Debug 2D
  hLambda_InvMass_vs_Pt:
    xAxis: *Pt
    yAxis: *InvMassLambda
    title: "M_{p#pi^{-}} vs p_{T};p_{T} [GeV/c];M_{p#pi^{-}} [GeV/c^{2}]"
  hLambda_InvMass_vs_DecayLength:
    xAxis: *DecayLength
    yAxis: *InvMassLambda
    title: "M_{p#pi^{-}} vs Decay Length;Decay Length [cm];M_{p#pi^{-}} [GeV/c^{2}]"
  hLambda_InvMass_vs_Y:
    xAxis: *Y
    yAxis: *InvMassLambda
    title: "M_{p#pi^{-}} vs Rapidity;y;M_{p#pi^{-}} [GeV/c^{2}]"
  hDCAV0_vs_InvMass:
    xAxis: *InvMassLambda
    yAxis: *DCA
    title: "DCA_{V0} vs M_{p#pi^{-}};M_{p#pi^{-}} [GeV/c^{2}];DCA [cm]"
  hCosPointing_vs_InvMass:
    xAxis: *InvMassLambda
    yAxis: *CosPointing
    title: "cos(#theta) vs M_{p#pi^{-}};M_{p#pi^{-}} [GeV/c^{2}];cos(#theta)"

  hN:
    nBins: 1
    min: 0.0
    max: 1.0
    title: "N processed events;dummy;count"
    type: TH1I
